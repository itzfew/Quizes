<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quizes</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    .center {
      text-align: center;
    }
    
    .input-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    input[type="text"] {
      padding: 8px;
      border: 1px solid #ccc;
      border-radius: 4px;
      margin-bottom: 10px;
    }

    button {
      padding: 8px 16px;
      border: none;
      background-color: #007bff;
      color: #fff;
      border-radius: 4px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div id="quizContainer">
    <h1 id="question"></h1>
    <div id="options"></div>
    <button id="nextBtn" class="next-btn">Next</button>
  </div>

  <div id="endPage" style="display: none;">
    <p>Congratulations, <span id="username"></span>! You have completed the quiz.</p>
    <button id="playAgainBtn">Play Again</button>
  </div>

  <div id="usernameDiv" class="center" style="display: none;">
    <label for="usernameInput">Enter your username:</label>
    <div class="input-wrapper">
      <input type="text" id="usernameInput">
      <button id="submitUsernameBtn">Submit</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
