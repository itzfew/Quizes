<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MCQ Quiz Game</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="quiz-container">
    <div class="question">What is the capital of France?</div>
    <div class="options">
        <div class="option" onclick="checkAnswer(this)">Paris</div>
        <div class="option" onclick="checkAnswer(this)">London</div>
        <div class="option" onclick="checkAnswer(this)">Berlin</div>
        <div class="option" onclick="checkAnswer(this)">Rome</div>
    </div>
</div>

<div class="result-container" style="display: none;">
    <div class="result"></div>
    <div class="buttons">
        <button class="play-again" onclick="playAgain()">Play Again</button>
        <button class="next-question" onclick="nextQuestion()">Next</button>
        <button class="prev-question" onclick="prevQuestion()">Previous</button>
    </div>
</div>

<script src="script.js"></script>

</body>
</html>
