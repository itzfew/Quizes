<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz Game</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="usernameDiv" class="center">
    <label for="usernameInput">Enter your username:</label>
    <div class="input-wrapper">
      <input type="text" id="usernameInput">
      <button id="submitUsernameBtn">Submit</button>
    </div>
  </div>
  
  <div id="quizContainer">
    <h1 id="question"></h1>
    <div id="options"></div>
    <button id="nextBtn" class="next-btn">Next</button>
  </div>

  <div id="endPage" style="display: none;">
    <p>Congratulations, <span id="username"></span>! You have completed the quiz.</p>
    <button id="playAgainBtn">Play Again</button>
  </div>

  <script src="script.js"></script>
</body>
</html>
