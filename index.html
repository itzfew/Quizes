<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz Game</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="quizContainer">
    <h1 id="question"></h1>
    <div id="options"></div>
    <button id="nextBtn" class="next-btn">Next</button>
  </div>

  <div id="endPage" style="display: none;">
    <p>Congratulations, <span id="username"></span>! You have completed the quiz.</p>
    <button id="playAgainBtn">Play Again</button>
    <a id="highScoreLink" href="highscores.html" style="display: none;">View High Scores</a>
  </div>

  <div id="usernameDiv" class="center">
    <label for="usernameInput">Enter your username:</label>
    <div class="input-wrapper">
      <input type="text" id="usernameInput">
      <button id="submitUsernameBtn">Submit</button>
    </div>
  </div>

  <script src="script.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", function() {
      const submitUsernameBtn = document.getElementById("submitUsernameBtn");
      const highScoreLink = document.getElementById("highScoreLink");
      const endPage = document.getElementById("endPage");
      const usernameSpan = document.getElementById("username");
      const playAgainBtn = document.getElementById("playAgainBtn");

      submitUsernameBtn.addEventListener("click", function() {
    const usernameInput = document.getElementById("usernameInput").value.trim();
    if (usernameInput !== "") {
        usernameSpan.textContent = usernameInput;
        endPage.style.display = "block";
        highScoreLink.style.display = "inline"; // Show high score link
        
        // Submit username and score to highscores.html
        const score = /* Calculate the score */;
        window.location.href = `highscores.html?username=${encodeURIComponent(usernameInput)}&score=${score}`;
    }
});

      playAgainBtn.addEventListener("click", function() {
        endPage.style.display = "none";
        document.getElementById("quizContainer").style.display = "block";
        // Reset quiz here if needed
      });
    });
  </script>
</body>
</html>
