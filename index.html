<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz Results</title>
<style>
  .center {
    text-align: center;
  }
  .input-wrapper {
    display: inline-block;
  }
</style>
</head>
<body>
<div id="endPage" style="display: none;">
  <p>Congratulations, <span id="username"></span>! You have completed the quiz.</p>
  <p>Your total score is: <span id="totalScore"></span></p>
  <button id="playAgainBtn">Play Again</button>
</div>

<div id="usernameDiv" class="center" style="display: none;">
  <label for="usernameInput">Enter your username:</label>
  <div class="input-wrapper">
    <input type="text" id="usernameInput">
    <button id="submitUsernameBtn">Submit</button>
  </div>
</div>

<script>
  // Define variables to track scores and username
  let correctAnswers = 0;
  let incorrectAnswers = 0;
  let missedAnswers = 0;
  let username = "";

  // Function to calculate total score
  function calculateTotalScore() {
    const totalScore = (correctAnswers * 4) - (incorrectAnswers);
    return totalScore >= 0 ? totalScore : 0;
  }

  // Function to display the results
  function displayResults() {
    const totalScore = calculateTotalScore();
    document.getElementById("totalScore").textContent = totalScore;
    document.getElementById("username").textContent = username;
    document.getElementById("endPage").style.display = "block";
  }

  // Event listener for submit username button
  document.getElementById("submitUsernameBtn").addEventListener("click", function() {
    username = document.getElementById("usernameInput").value;
    document.getElementById("usernameDiv").style.display = "none";
    displayResults();
  });

  // Event listener for play again button
  document.getElementById("playAgainBtn").addEventListener("click", function() {
    // Reset variables and hide end page
    correctAnswers = 0;
    incorrectAnswers = 0;
    missedAnswers = 0;
    document.getElementById("endPage").style.display = "none";
    // You can add code here to reset the quiz and start over
  });
</script>
</body>
</html>
