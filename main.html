<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OMR Sheet</title>
<style>body {
  font-family: Arial, sans-serif;
}

h1 {
  text-align: center;
}

form {
  max-width: 600px;
  margin: 0 auto;
}

p {
  font-weight: bold;
}</style>
</head>
<body>
<h1>OMR Sheet</h1>
<form id="omrForm">
  <p>Question 1:</p>
  <input type="radio" name="q1" value="A"> A
  <input type="radio" name="q1" value="B"> B
  <input type="radio" name="q1" value="C"> C
  <input type="radio" name="q1" value="D"> D
  <br>
  <p>Question 2:</p>
  <input type="radio" name="q2" value="A"> A
  <input type="radio" name="q2" value="B"> B
  <input type="radio" name="q2" value="C"> C
  <input type="radio" name="q2" value="D"> D
  <br>
  <!-- Add more questions as needed -->
  <br>
  <button type="button" onclick="submitOMR()">Submit OMR</button>
</form>

<script>
function submitOMR() {
    var selectedOptions = [];
    var inputs = document.querySelectorAll('input[type="radio"]:checked');
    inputs.forEach(input => {
        selectedOptions.push(input.value);
    });
    sessionStorage.setItem('selectedOptions', JSON.stringify(selectedOptions));
    window.location.href = 'second-page.html';
}

function checkAnswers() {
    var selectedOptions = JSON.parse(sessionStorage.getItem('selectedOptions'));
    var correctOptions = ['A', 'B', 'C', 'D']; // Example correct options
    var correctCount = 0;
    var incorrectQuestions = [];
    for (var i = 0; i < correctOptions.length; i++) {
        if (selectedOptions[i] === correctOptions[i]) {
            correctCount++;
        } else {
            incorrectQuestions.push(i + 1);
        }
    }
    sessionStorage.setItem('incorrectQuestions', JSON.stringify(incorrectQuestions));
    window.location.href = 'third-page.html';
}
  
</script>
</body>
</html>
