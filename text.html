<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>File Manager</title>
    <style>body {
    font-family: Arial, sans-serif;
    margin: 0;
    padding: 0;
}

.container {
    display: flex;
    flex-direction: row;
    height: 100vh;
}

.navigation-menu {
    background-color: #333;
    padding: 10px;
    border-right: 1px solid #000;
}

.menu-btn {
    cursor: pointer;
    color: #fff;
    font-size: 24px;
    margin-bottom: 10px;
}

.menu-items {
    list-style-type: none;
    padding: 0;
    display: none;
}

.menu-items li {
    margin-bottom: 5px;
}

.menu-items a {
    text-decoration: none;
    color: #fff;
}

.main-content {
    flex: 1;
    padding: 20px;
}

.section {
    border: 1px solid #000;
    margin-bottom: 20px;
    padding: 10px;
}</style>
</head>
<body>
    <div class="container" style="background-color: #dd981e;">
        <div class="navigation-menu">
            <div class="menu-btn" onclick="toggleMenu()">&#9776;</div>
            <ul class="menu-items">
                <li><a href="#">Home</a></li>
                <li><a href="#">Documents</a></li>
                <li><a href="#">Downloads</a></li>
                <li><a href="#">Images</a></li>
                <!-- Add more menu items as needed -->
            </ul>
        </div>
        <div class="main-content">
            <section class="section">
                <h2><img src="file_manager_logo.png" alt="File Manager Logo"> Home</h2>
                <!-- Content for Home section -->
            </section>
            <section class="section">
                <h2><img src="file_manager_logo.png" alt="File Manager Logo"> Documents</h2>
                <!-- Content for Documents section -->
            </section>
            <section class="section">
                <h2><img src="file_manager_logo.png" alt="File Manager Logo"> Downloads</h2>
                <!-- Content for Downloads section -->
            </section>
            <section class="section">
                <h2><img src="file_manager_logo.png" alt="File Manager Logo"> Images</h2>
                <!-- Content for Images section -->
            </section>
            <!-- Add more sections as needed -->
        </div>
    </div>
    <script>function toggleMenu() {
    var menuItems = document.querySelector('.menu-items');
    menuItems.style.display = menuItems.style.display === 'block' ? 'none' : 'block';
}</script>
</body>
</html>
