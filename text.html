<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>File Manager</title>
    <style>
       

.menu-btn {
  position: fixed;
  top: 20px;
  left: 20px;
  width: 30px;
  height: 30px;
  cursor: pointer;
}

.menu-icon {
  width: 100%;
  height: 2px;
  background-color: #000;
  position: relative;
  transition: transform 0.5s;
}

.menu-icon::before,
.menu-icon::after {
  content: '';
  width: 100%;
  height: 2px;
  background-color: #000;
  position: absolute;
  transition: transform 0.5s;
}

.menu-icon::before {
  top: -8px;
}

.menu-icon::after {
  top: 8px;
}

.menu {
  position: fixed;
  top: 0;
  left: -200px;
  width: 200px;
  height: 100%;
  background-color: #f0f0f0;
  transition: left 0.5s;
}

.menu.open {
  left: 0;
}

ul {
  list-style-type: none;
  padding: 0;
}

li {
  padding: 10px;
}

button {
  width: 100%;
  padding: 10px;
  border: none;
  background-color: transparent;
  cursor: pointer;
}

button:hover {
  background-color: #ddd;
}

        
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #dd981e;
        }

        .main-content {
            padding: 20px;
        }

        .section {
            border: 1px solid #000;
            margin-bottom: 20px;
            padding: 10px;
            transition: all 0.3s ease;
        }

        .section:hover {
            transform: translateY(-3px);
            box-shadow: 0 3px 5px rgba(0, 0, 0, 0.3);
        }

        .logo {
            height: 1em; /* Adjust the height as needed */
            vertical-align: middle;
            margin-right: 10px; /* Add margin between image and text */
        }

        .toggle-button {
            cursor: pointer;
            color: #333;
            background-color: #fff;
            border: 1px solid #333;
            padding: 5px 10px;
            border-radius: 5px;
            margin-bottom: 10px;
            display: inline-block;
        }

        .subfiles {
            display: none;
        }

        .subfile {
            cursor: pointer;
            display: flex;
            align-items: center;
            margin-bottom: 5px;
        }

        .subfile:hover {
            color: blue;
        }

        .subfile .text {
            margin-left: 10px;
        }
    </style>
</head>
<body>
    <div class="menu-btn">
  <div class="menu-icon"></div>
</div>

<nav class="menu">
  <ul>
    <li><button>Button 1</button></li>
    <li><button>Button 2</button></li>
    <li><button>Button 3</button></li>
    <li><button>Button 4</button></li>
  </ul>
</nav>


    
    <div class="main-content">
        <section class="section" onclick="toggleSubfiles(event)">
            <h2 class="toggle-button">
                <img src="file_manager_logo.png" alt="File Manager Logo" class="logo"> Home
            </h2>
            <div class="subfiles">
                <div class="subfile">
                    <img src="file_manager_logo.png" alt="Subfile Logo" class="logo">
                    <a href="#" class="text">Subfile 1</a>
                </div>
                <div class="subfile">
                    <img src="file_manager_logo.png" alt="Subfile Logo" class="logo">
                    <a href="#" class="text">Subfile 2</a>
                </div>
                <!-- Add more subfiles as needed -->
            </div>
        </section>
        <section class="section" onclick="toggleSubfiles(event)">
            <h2 class="toggle-button">
                <img src="file_manager_logo.png" alt="File Manager Logo" class="logo"> Documents
            </h2>
            <div class="subfiles">
                <div class="subfile">
                    <img src="file_manager_logo.png" alt="Subfile Logo" class="logo">
                    <a href="#" class="text">Subfile 1</a>
                </div>
                <div class="subfile">
                    <img src="file_manager_logo.png" alt="Subfile Logo" class="logo">
                    <a href="#" class="text">Subfile 2</a>
                </div>
                <!-- Add more subfiles as needed -->
            </div>
        </section>
        <!-- Add more sections as needed -->
    </div>

    <script>
        function toggleSubfiles(event) {
            var subfiles = event.currentTarget.querySelector('.subfiles');
            if (subfiles.style.display === 'block') {
                subfiles.style.display = 'none';
            } else {
                subfiles.style.display = 'block';
            }
        }
        
        document.querySelector('.menu-btn').addEventListener('click', function() {
  document.querySelector('.menu').classList.toggle('open');
});
    </script>
</body>
</html>
