<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Font Changer</title>
<style>
  body {
    font-family: Arial, sans-serif;
  }
  #textArea {
    width: 80%;
    height: 100px;
    margin: 20px auto;
    padding: 10px;
    font-size: 16px;
  }
  .font-option {
    margin-bottom: 10px;
    font-family: Arial, Times New Roman, Courier New, Verdana, Georgia, Tahoma, 
                 рқ—Ә, рқ—җ, рқ–¶, Фқ, рқҳ„, бҙЎ, бҺі, вұІ, бөӮ, рқҷ’, рқҳё, рқҳһ, кҹҪ, рқҡҶ, рқҷ¬, бҸ”, 
                 рқҗ–, вұі, рқ‘ҫ, рқ‘Ҡ, рқҗ°, рқ•Ё, рқ•Һ, РЁ, бәҖ, бәӮ, рқ‘Ө, бә„, рҹқғ, б—Ҝ, СҲ, Пү, 
                 бәҶ, бҷҺ, Жң, вҚө, рқ“Ұ, Р©, Еҙ, бҷЎ, вӮ©, СЎ, вЁҲ, рқһҲ, рқӣҡ, аәһ, рқң”, вІ°, аҙ§, 
                 рққҺ, вІұ, бәҲ, бҘ•, вҹ’, рҹҶҶ, рҹҮј, бҲ , бҲЎ, а®Ҝ, пҪ—, аёһ, аәҹ, ПҺ, аёҹ, в’І, аҙЎ, аәң;
  }
  .font-option button {
    margin-left: 10px;
  }
</style>
</head>
<body>
<textarea id="textArea" placeholder="Type your text here..."></textarea>
<div id="fonts"></div>

<script>
  const textArea = document.getElementById('textArea');
  const fontsDiv = document.getElementById('fonts');

  const fonts = [
    'Arial', 
    'Times New Roman', 
    'Courier New', 
    'Verdana', 
    'Georgia', 
    'Tahoma',
    'рқ—Ә',
    'рқ—җ',
    'рқ–¶',
    'Фқ',
    'рқҳ„',
    'бҙЎ',
    'бҺі',
    'вұІ',
    'бөӮ',
    'рқҷ’',
    'рқҳё',
    'рқҳһ',
    'кҹҪ',
    'рқҡҶ',
    'рқҷ¬',
    'бҸ”',
    'рқҗ–',
    'вұі',
    'рқ‘ҫ',
    'рқ‘Ҡ',
    'рқҗ°',
    'рқ•Ё',
    'рқ•Һ',
    'РЁ',
    'бәҖ',
    'бәӮ',
    'рқ‘Ө',
    'бә„',
    'рҹқғ',
    'б—Ҝ',
    'СҲ',
    'Пү',
    'бәҶ',
    'бҷҺ',
    'Жң',
    'вҚө',
    'рқ“Ұ',
    'Р©',
    'Еҙ',
    'бҷЎ',
    'вӮ©',
    'СЎ',
    'вЁҲ',
    'рқһҲ',
    'рқӣҡ',
    'аәһ',
    'рқң”',
    'вІ°',
    'аҙ§',
    'рққҺ',
    'вІұ',
    'бәҲ',
    'бҘ•',
    'вҹ’',
    'рҹҶҶ',
    'рҹҮј',
    'бҲ ',
    'бҲЎ',
    'а®Ҝ',
    'пҪ—',
    'аёһ',
    'аәҹ',
    'ПҺ',
    'аёҹ',
    'в’І',
    'аҙЎ',
    'аәң'
  ];

  function copyText(text, styling) {
    const span = document.createElement('span');
    span.textContent = text;
    span.style.cssText = styling;
    document.body.appendChild(span);
    if (document.selection) {
      const range = document.body.createTextRange();
      range.moveToElementText(span);
      range.select().createTextRange();
      document.execCommand("copy");
    } else if (window.getSelection) {
      const range = document.createRange();
      range.selectNode(span);
      window.getSelection().removeAllRanges();
      window.getSelection().addRange(range);
      document.execCommand("copy");
    }
    document.body.removeChild(span);
  }

  function updateFonts() {
    const text = textArea.value;
    fontsDiv.innerHTML = '';
    fonts.forEach(font => {
      const span = document.createElement('span');
      span.textContent = text;
      span.style.fontFamily = font;
      span.className = 'font-option';

      const copyButton = document.createElement('button');
      copyButton.textContent = 'Copy Text';
      copyButton.addEventListener('click', () => copyText(text, `font-family: ${font};`));

      const fontDiv = document.createElement('div');
      fontDiv.appendChild(span);
      fontDiv.appendChild(copyButton);

      fontsDiv.appendChild(fontDiv);
    });
  }

  textArea.addEventListener('input', updateFonts);

  // Initial update
  updateFonts();
</script>
</body>
</html>
