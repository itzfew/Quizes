<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>File Manager</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #dd981e;
        }

        .main-content {
            padding: 20px;
        }

        .section {
            border: 1px solid #000;
            margin-bottom: 20px;
            padding: 10px;
            transition: all 0.3s ease;
        }

        .section:hover {
            transform: translateY(-3px);
            box-shadow: 0 3px 5px rgba(0, 0, 0, 0.3);
        }

        .logo {
            height: 1em; /* Adjust the height as needed */
            vertical-align: middle;
            margin-right: 10px; /* Add margin between image and text */
        }

        .toggle-button {
            cursor: pointer;
            color: #333;
            background-color: #fff;
            border: 1px solid #333;
            padding: 5px 10px;
            border-radius: 5px;
            margin-bottom: 10px;
            display: inline-block;
        }

        .subfile {
            cursor: pointer;
            display: flex;
            align-items: center;
            margin-bottom: 5px;
        }

        .subfile:hover {
            color: blue;
        }

        .subfile .text {
            margin-left: 10px;
        }
    </style>
</head>
<body>
    <div class="main-content">
        <section class="section">
            <h2 class="toggle-button" onclick="toggleSubfiles(event)">
                <img src="file_manager_logo.png" alt="File Manager Logo" class="logo"> Home
            </h2>
            <div class="subfiles" style="display: none;">
                <div class="subfile">
                    <img src="subfile_logo.png" alt="Subfile Logo" class="logo">
                    <a href="#" class="text">Subfile 1</a>
                </div>
                <div class="subfile">
                    <img src="subfile_logo.png" alt="Subfile Logo" class="logo">
                    <a href="#" class="text">Subfile 2</a>
                </div>
                <!-- Add more subfiles as needed -->
            </div>
        </section>
        <section class="section">
            <h2 class="toggle-button" onclick="toggleSubfiles(event)">
                <img src="file_manager_logo.png" alt="File Manager Logo" class="logo"> Documents
            </h2>
            <div class="subfiles" style="display: none;">
                <div class="subfile">
                    <img src="subfile_logo.png" alt="Subfile Logo" class="logo">
                    <a href="#" class="text">Subfile 1</a>
                </div>
                <div class="subfile">
                    <img src="subfile_logo.png" alt="Subfile Logo" class="logo">
                    <a href="#" class="text">Subfile 2</a>
                </div>
                <!-- Add more subfiles as needed -->
            </div>
        </section>
        <!-- Add more sections as needed -->
    </div>

    <script>
        function toggleSubfiles(event) {
            var subfiles = event.target.parentElement.nextElementSibling;
            if (subfiles.style.display === 'block') {
                subfiles.style.display = 'none';
            } else {
                subfiles.style.display = 'block';
            }
        }
    </script>
</body>
</html>
