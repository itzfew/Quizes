<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Select Correct Options</title>
</head>
<body>
<h1>Select Correct Options</h1>
<form id="questionsForm">
  <p>Question 1:</p>
  <input type="radio" name="q1" value="A"> A
  <input type="radio" name="q1" value="B"> B
  <input type="radio" name="q1" value="C"> C
  <input type="radio" name="q1" value="D"> D
  <br>
  <p>Question 2:</p>
  <input type="radio" name="q2" value="A"> A
  <input type="radio" name="q2" value="B"> B
  <input type="radio" name="q2" value="C"> C
  <input type="radio" name="q2" value="D"> D
  <br>
  <!-- Add more questions as needed -->
  <br>
  <button type="button" onclick="checkAnswers()">Check Answers</button>
</form>

<script>
function checkAnswers() {
    var selectedOptions = [];
    var q1Inputs = document.getElementsByName('q1');
    var q2Inputs = document.getElementsByName('q2');
    
    if (isSelected(q1Inputs) && isSelected(q2Inputs)) {
        var q1Selected = getSelectedValue(q1Inputs);
        var q2Selected = getSelectedValue(q2Inputs);

        selectedOptions.push(q1Selected);
        selectedOptions.push(q2Selected);

        var correctOptions = ['A', 'B']; // Example correct options
        var correctCount = 0;
        var incorrectQuestions = [];

        for (var i = 0; i < correctOptions.length; i++) {
            if (selectedOptions[i] === correctOptions[i]) {
                correctCount++;
            } else {
                incorrectQuestions.push(i + 1);
            }
        }

        if (correctCount === correctOptions.length) {
            sessionStorage.setItem('correct', 'true');
            window.location.href = 'third-page.html';
        } else {
            sessionStorage.setItem('incorrectQuestions', JSON.stringify(incorrectQuestions));
            alert('Some questions are incorrect. Please review your answers.');
        }
    } else {
        alert('Please answer all questions before checking.');
    }
}

function isSelected(inputs) {
    for (var i = 0; i < inputs.length; i++) {
        if (inputs[i].checked) {
            return true;
        }
    }
    return false;
}

function getSelectedValue(inputs) {
    for (var i = 0; i < inputs.length; i++) {
        if (inputs[i].checked) {
            return inputs[i].value;
        }
    }
}
</script>

</body>
</html>
