<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Results</title>
<style>
.correct { color: green; }
.incorrect { color: red; }
</style>
</head>
<body>
<h1>Results</h1>
<div id="results"></div>

<script>
// Retrieve selected options from session storage
var selectedOptions1 = JSON.parse(sessionStorage.getItem('selectedOptions1'));
var selectedOptions2 = JSON.parse(sessionStorage.getItem('selectedOptions2'));

// Check if selected options are available
if (selectedOptions1 && selectedOptions2) {
    var resultsDiv = document.getElementById('results');
    // Iterate over the questions
    for (var i = 0; i < selectedOptions1.length; i++) {
        var questionNum = i + 1;
        var questionDiv = document.createElement('div');
        var questionText = document.createTextNode('Question ' + questionNum + ': ');
        questionDiv.appendChild(questionText);
        
        // Compare selected options for each question
        if (selectedOptions1[i] === selectedOptions2[i]) {
            questionDiv.classList.add('correct');
            var optionText = document.createTextNode('Selected option: ' + selectedOptions1[i]);
        } else {
            questionDiv.classList.add('incorrect');
            var optionText = document.createTextNode('Selected options are different');
        }
        
        questionDiv.appendChild(optionText);
        resultsDiv.appendChild(questionDiv);
    }
} else {
    // Handle case when selected options are not available
    document.getElementById('results').innerHTML = '<p>No selected options found. Please go back and select options.</p>';
}
</script>

</body>
</html>
