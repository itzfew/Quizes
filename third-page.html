<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Results</title>
<style>
.correct { color: green; }
.incorrect { color: red; }
</style>
</head>
<body>
<h1>Results</h1>
<div id="results"></div>

<script>
// Retrieve selected options from session storage
var selectedOptions = JSON.parse(sessionStorage.getItem('selectedOptions'));

if (selectedOptions) {
    // Generate content for each question dynamically
    var resultsDiv = document.getElementById('results');
    for (var i = 0; i < selectedOptions.length; i++) {
        var questionNum = i + 1;
        var questionDiv = document.createElement('div');
        var questionText = document.createTextNode('Question ' + questionNum + ': ');
        questionDiv.appendChild(questionText);
        var optionText = document.createTextNode('Selected option: ' + selectedOptions[i]);
        questionDiv.appendChild(optionText);
        // Check if the selected option is correct
        if (selectedOptions[i] === getCorrectOption(questionNum)) {
            questionDiv.classList.add('correct');
        } else {
            questionDiv.classList.add('incorrect');
        }
        resultsDiv.appendChild(questionDiv);
    }
} else {
    // Handle case when no selected options are found
    resultsDiv.innerHTML = '<p>No selected options found. Please go back and select options.</p>';
}

function getCorrectOption(questionNum) {
    // Define correct options for each question
    if (questionNum === 1) {
        return 'A'; // Correct option for question 1
    } else if (questionNum === 2) {
        return 'B'; // Correct option for question 2
    }
    // Add more questions as needed
}
</script>

</body>
</html>
