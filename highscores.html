<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>High Scores</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f0f0f0;
      margin: 0;
      padding: 0;
    }

    h1 {
      text-align: center;
    }

    #scoresContainer {
      max-width: 600px;
      margin: 0 auto;
      padding: 20px;
      background-color: #fff;
      border-radius: 8px;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
    }

    .scoreEntry {
      margin-bottom: 10px;
      padding: 10px;
      border-bottom: 1px solid #ccc;
    }
  </style>
</head>
<body>
  <h1>High Scores</h1>
  
  <div id="scoresContainer">
    <!-- Scores will be dynamically added here -->
  </div>

  <script>
    document.addEventListener("DOMContentLoaded", function() {
    const scoresContainer = document.getElementById('scoresContainer');
    const urlParams = new URLSearchParams(window.location.search);

    // Retrieve and display username and score
    const username = urlParams.get('username');
    const score = urlParams.get('score');
    if (username && score) {
        const scoreEntry = document.createElement('div');
        scoreEntry.classList.add('scoreEntry');
        scoreEntry.textContent = `Username: ${username}, Score: ${score}`;
        scoresContainer.appendChild(scoreEntry);
    }
});
  </script>
</body>
</html>
